[build-system]
# Crucial: Include hatch-vcs here so uv downloads it during the build phase
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

[project]
name = "ogopego"
description = "A PEG Parser generator for the Go language"
authors = [
    { name = "Juancarlo Añez", email = "apalala@gmail.com" }
]
requires-python = ">=3.14"
dependencies = []
dynamic = ["version"]  # Tell Hatch that the version is determined at runtime
#license = "Apache-2.0"
license = { file = "LICENSE" }

[project.scripts]
ogopego = "ogopego:main"

[tool.hatch.version]
source = "vcs"  # Instructs Hatch to read from Git tags

[dependency-groups]
dev = [
    "hatch>=1.16.5",
    "pybindgen>=0.22.1",
    "wheel>=0.47.0",
]
