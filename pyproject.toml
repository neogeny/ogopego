#[build-system]
#requires = ["setuptools>=68", "pybindgen"]
#build-backend = "setuptools.build_meta:__legacy__"
[build-system]
requires = ["hatchling", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[project]
name = "ogopego"
dynamic = ["version"]
description = "PEG Parser Generator in Go with Python bindings"
readme = "README.md"
license = { file = "LICENSE" }
authors = [
    { name = "Juancarlo Añez", email = "apalala@gmail.com" },
]
requires-python = ">=3.12"
keywords = ["PEG", "parser", "generator", "Go"]
classifiers = [
    "Programming Language :: Python :: 3",
    "Programming Language :: Go",
    "License :: OSI Approved :: Apache Software License",
    "Topic :: Software Development :: Code Generators",
#    "Topic :: Text Processing :: Parsing",
]
urls = { Homepage = "https://github.com/neogeny/ogopego" }

[tool.setuptools-git-versioning]
enabled = true

[tool.hatch.version]
source = "uv-dynamic-versioning"

[tool.setuptools.packages.find]
where = ["ogopego"]
include = ["*"]

[tool.hatch.build.targets.wheel]
packages = ["ogopego"]
include = [
    "ogopego/*.py",
    "ogopego/*.so",
    "ogopego/*.pyd",
]

[tool.setuptools.package-data]
"*" = ["*.so", "*.pyd", "*.dll", "*.dylib"]