[project]
name = "ogopego"
dynamic = ["version"]
version = "0.1.0"
description = "A PEG Parser generator in Go"
readme = "README.md"
authors = [
    { name = "Juancarlo Añez", email = "apalala@gmail.com" }
]
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["python/ogopego"]

# Exclude all compiled binaries by default from standard packaging passes
exclude = [
    "python/ogopego/lib/*"
]
# Dynamically override and inject the correct binary into the target wheel location.
# This maps the workspace file directly to the embedded distribution 'lib' directory.
[tool.hatch.build.targets.wheel.force-include]
"python/ogopego/lib/{env:HATCH_BIN_NAME:placeholder}" = "ogopego/lib/{env:HATCH_BIN_NAME:placeholder}"

#[tool.hatch.build.targets.wheel.hooks.custom]
#path = "python/ogopego/build.py" # Keeps Hatchling happy during sdist fallbacks

