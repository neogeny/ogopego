[project]
name = "ogopego"
dynamic = ["version"]
description = "A PEG Parser generator in Go"
readme = "README.md"
authors = [
    { name = "Juancarlo Añez", email = "apalala@gmail.com" }
]
requires-python = ">=3.12"
dependencies = []

[build-system]
requires = ["hatchling", "hatch-vcs", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.sdist]
include = [
    "SYNTAX.md",
    "CUT.md",
    "grammar/tatsu.*",
    "grammar/calc.*",
    "go.*",
    "*.go",
    "api/**/*.go",
    "cmd/**/*.go",
    "pkg/**/*.go",
    "test/**/*.go",
    "python"
]
exclude = [
    "_*",
    "python/ogopego/bin",
]

[tool.hatch.build.targets.wheel]
packages = ["python/ogopego"]
include = [
    "python/ogopego/bin/*"
]
[tool.hatch.build.targets.wheel.force-include]
"python/ogopego/bin" = "ogopego/bin"

#[tool.uv.extra-build-dependencies]
#ogopego = ["hatchling.build.hooks"]

[tool.hatch.build.hooks.custom]
path = "python/hatch_build.py"

