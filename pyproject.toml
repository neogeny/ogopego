[project]
name = "ogopego"
dynamic = ["version"]
description = "A PEG Parser generator in Go"
readme = "README.md"
authors = [
    { name = "Juancarlo Añez", email = "apalala@gmail.com" }
]
requires-python = ">=3.12"
dependencies = [
    "tatsu>=5.20.0",
]

[build-system]
requires = ["hatchling", "hatch-vcs", "uv-dynamic-versioning"]
build-backend = "hatchling.build"

[tool.hatch.version]
source = "vcs"

[tool.hatch.build.targets.sdist]
include = [
    "SYNTAX.md",
    "CUT.md",
    "grammar/tatsu.*",
    "grammar/calc.*",
    "go.*",
    "*.go",
    "api/**/*.go",
    "cmd/**/*.go",
    "pkg/**/*.go",
    "test/**/*.go",
    "python"
]
exclude = [
    "/_*",
    "python/ogopego/bin",
]

[tool.hatch.build.targets.wheel]
packages = ["python/ogopego"]
pure = false
include = [
    "python/ogopego/bin/*"
]
artifacts = [
    "grammar/tatsu.*",
    "grammar/calc.*",
    "*.toml",
]
#[tool.hatch.build.targets.wheel.force-include]
#"python/ogopego/bin" = "ogopego/bin"


[tool.cibuildwheel]
# -ldflags="-s -w" strips debug information and symbols to drastically reduce binary size.
# -gcflags="all=-B" disables bounds checking for a performance boost (optional/use with caution).
before-build = """\
go build -ldflags='-s -w' -gcflags='all=-B' \
-o python/ogopego/bin/ \
./api \
./cmd \
./cmd/cli \
./pkg/config \
./pkg/context \
./pkg/input \
./pkg/asjson \
./pkg/peg \
./pkg/trees \
./pkg/util/ \
"""
build-frontend = "build[uv]"
environment-pass = ["PATH"]
environment = { GOPATH = "/tmp/gopath", GOCACHE = "/tmp/gocache" }

[tool.hatch.build.hooks.custom]
path = "python/hatch_build.py"

[dependency-groups]
dev = [
    "wheel>=0.47.0",
]

