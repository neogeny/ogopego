name: Build and Publish Wheels

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish artifacts to PyPI?'
        required: true
        type: boolean
        default: false

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Set up Go natively for macOS and Windows host compilation
      - name: Set up Go
        if: matrix.os != 'ubuntu-latest'
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build Wheels via cibuildwheel
        uses: pypa/cibuildwheel@v2.22.0
        env:
          # On Windows and macOS, use the host Go.
          # On Linux, dynamically bootstrap Go inside the manylinux container via hooks to avoid host-mismatch code 127.
          CIBW_BEFORE_ALL_LINUX: "curl -L https://go.dev/dl/go1.24.0.linux-amd64.tar.gz | tar -C /usr/local -xzf -"
          CIBW_ENVIRONMENT_LINUX: 'PATH=$PATH:/usr/local/go/bin GOPATH=/tmp/gopath GOCACHE=/tmp/gocache'

          # Maintain uniform output path targeting for all platforms
          CIBW_BEFORE_BUILD: "go build -ldflags='-s -w' -gcflags='all=-B' -o python/ogopego/bin/ ./api ./cmd ./cmd/cli ./pkg/config ./pkg/context ./pkg/input ./pkg/asjson ./pkg/peg ./pkg/trees ./pkg/util/"
          CIBW_BUILD_FRONTEND: "build[uv]"

      - name: Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build sdist
        run: uv build --sdist

      - name: Upload sdist
        uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  publish_release:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    if: ${{ github.event_name == 'release' || inputs.publish == true }}
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
