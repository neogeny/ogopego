name: Build and Publish Wheels

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to check out and build from'
        required: false
        type: string
      publish:
        description: 'Publish artifacts to PyPI?'
        required: true
        type: boolean
        default: false

jobs:
  build_wheels:
    name: Build wheel on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: ogopego_linux_amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            binary: ogopego_darwin_arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            binary: ogopego_windows_amd64.exe

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.ref_name || inputs.tag || '' }}

      - name: Install Go
        shell: bash
        run: |
          case ${{ runner.os }} in
            Linux)  curl -fsSL https://go.dev/dl/go1.26.3.linux-amd64.tar.gz | sudo tar -C /usr/local -xzf - ;;
            macOS)  curl -fsSL https://go.dev/dl/go1.26.3.darwin-arm64.tar.gz | sudo tar -C /usr/local -xzf - ;;
            Windows) curl -fsSL https://go.dev/dl/go1.26.3.windows-amd64.zip -o /tmp/go.zip && unzip -q /tmp/go.zip -d /usr/local/ ;;
          esac
          echo '/usr/local/go/bin' >> "$GITHUB_PATH"

      - name: Build Go binary
        shell: bash
        run: go build -ldflags='-s -w' -gcflags='all=-B' -o python/ogopego/bin/${{ matrix.binary }} ./cmd/
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'

      - uses: astral-sh/setup-uv@v5

      - name: Build wheel
        run: uv build --wheel

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}
          path: dist/*.whl

  build_sdist:
    name: Build Source Distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'release' && github.ref_name || inputs.tag || '' }}

      - uses: astral-sh/setup-uv@v5

      - name: Build sdist
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: wheel-sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    if: ${{ github.event_name == 'release' || inputs.publish == true }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
