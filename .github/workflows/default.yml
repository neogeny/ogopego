name: default

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: download dependencies
        run: go mod download

      - name: build
        run: go build -mod=mod ./...

      - name: just
        run: sudo apt update && sudo apt install -y just

      - name: tools
        run: just tools

      - name: lint
        run: just lint

      - name: test
        run: just test-v