name: default

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  ci:
    runs-on: ubuntu-latest
    env:
      GOFLAGS: -mod=vendor
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          args: --modules-download-mode=vendor

      - name: build
        run: go build ./...

      - name: test
        run: go test -count=1 ./api ./cmd/ogo ./config ./context ./input ./json ./peg ./test ./trees ./util/...
